<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Found Pompeii — A Roman City-Building Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4efe4; --paper: #faf6ee; --panel: #efe7d6;
    --border: #c8bca6; --border-soft: #d8ccb4;
    --ink: #3d3425; --muted: #8a7d6b;
    --accent: #c4553e; --accent-hover: #b04530;
    --accent-soft: #e8a090;
    --water: #4a7c8f; --water-soft: #a3ccd8; --water-faint: rgba(74,124,143,0.08);
    --ok: #5a8a5e; --ok-soft: #b4cdb6;
    --truth: #5a8a5e;
    --hint-bg: #f0e8d4;
    --sans: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', ui-monospace, Menlo, monospace;
    --serif: 'Cormorant Garamond', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans); background: var(--bg); color: var(--ink);
    line-height: 1.5; font-size: 13.5px;
  }

  /* Full viewport 16:9 stage */
  .stage {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    background: var(--bg);
  }

  .site-head {
    flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 22px;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
  }
  .site-title { font-family: var(--serif); font-weight: 500; font-size: 20px; }
  .site-title em { font-style: italic; color: var(--accent); }
  .site-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); letter-spacing: 0.5px; }

  /* Stepper */
  .stepper {
    flex-shrink: 0;
    display: flex; gap: 6px;
    padding: 8px 22px;
    background: var(--paper);
    border-bottom: 1px solid var(--border-soft);
    font-size: 10.5px; font-family: var(--mono); color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .step-tag {
    padding: 3px 10px; border: 1px solid var(--border-soft);
    border-radius: 2px; white-space: nowrap;
  }
  .step-tag.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .step-tag.done { color: var(--ok); border-color: var(--ok); }

  /* Two-column body */
  .body {
    flex: 1; display: flex; overflow: hidden;
    min-height: 0;
  }
  .pane-left {
    width: 360px; flex-shrink: 0;
    overflow-y: auto;
    padding: 18px 18px 24px 22px;
    border-right: 1px solid var(--border);
    background: var(--bg);
    display: flex; flex-direction: column; gap: 12px;
  }
  .pane-right {
    flex: 1; overflow: hidden;
    background: var(--paper);
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
    position: relative;
  }
  .map-shell {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .map-shell svg {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    background: #fffdf7; border-radius: 2px;
    border: 1px solid var(--border-soft);
  }

  /* Cards */
  .card {
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 4px; padding: 16px;
  }
  h2 {
    font-family: var(--serif); font-weight: 500;
    font-size: 22px; margin-bottom: 10px; letter-spacing: 0.2px;
  }
  h2 em { font-style: italic; color: var(--accent); }
  h3 {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 8px;
  }
  p { margin-bottom: 8px; }
  p.lede { font-size: 14px; line-height: 1.55; }
  p.dim { color: var(--muted); }

  /* Buttons */
  .btn {
    font-family: var(--sans); font-weight: 600; font-size: 12.5px;
    letter-spacing: 0.3px; padding: 8px 16px;
    border: 1px solid var(--border); background: transparent;
    color: var(--ink); border-radius: 3px; cursor: pointer;
    transition: background 0.1s;
  }
  .btn:hover { background: var(--panel); }
  .btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
    padding: 10px 20px;
  }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.tiny { font-size: 11px; padding: 5px 11px; }

  /* Step header */
  .step-title-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .step-num { font-family: var(--mono); font-size: 10.5px; color: var(--accent); font-weight: 700; letter-spacing: 1px; }
  .step-title-row h2 { margin-bottom: 0; font-size: 19px; }
  .brief { font-size: 12.5px; line-height: 1.55; margin-bottom: 0; }
  .brief strong { color: var(--accent); font-weight: 600; }

  /* Hints */
  .hint-tone { background: var(--hint-bg); border-color: #d4c8a8; }
  .hint-list { list-style: none; }
  .hint-list li {
    font-size: 12px; padding: 4px 0; line-height: 1.45;
    border-bottom: 1px dotted var(--border-soft);
  }
  .hint-list li:last-child { border-bottom: none; }
  .hint-list li::before { content: "✦"; color: var(--accent); margin-right: 6px; }

  /* Feedback */
  .feedback-card {
    background: var(--paper); border: 1px solid var(--ok);
    border-left: 4px solid var(--ok);
    border-radius: 4px; padding: 11px 13px; margin-bottom: 10px;
  }
  .feedback-card.warning { border-color: var(--accent); border-left-color: var(--accent); }
  .feedback-card h4 {
    font-family: var(--serif); font-weight: 500; font-size: 15px;
    margin-bottom: 4px; font-style: italic;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .feedback-card .step-score {
    font-family: var(--mono); font-size: 13px;
    font-weight: 700; color: var(--ok); font-style: normal;
  }
  .feedback-card.warning .step-score { color: var(--accent); }
  .feedback-card p { font-size: 12px; margin-bottom: 3px; }
  .feedback-card p:last-child { margin-bottom: 0; }

  /* Tile tray (step 3) */
  .tile-tray {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    margin-top: 6px; max-height: 360px; overflow-y: auto;
  }
  .tile {
    padding: 6px 8px; border: 1px solid var(--border);
    border-radius: 3px; background: var(--paper);
    cursor: grab; user-select: none;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.1s;
  }
  .tile:hover { border-color: var(--accent); transform: translateY(-1px); }
  .tile.dragging { opacity: 0.4; cursor: grabbing; }
  .tile.placed {
    background: var(--panel); cursor: pointer;
    border-style: dashed; opacity: 0.55;
  }
  .tile.placed:hover { transform: none; opacity: 0.75; }
  .tile-thumb {
    width: 32px; height: 32px; flex-shrink: 0;
    background: var(--paper); border-radius: 2px; padding: 2px;
  }
  .tile-thumb svg { width: 100%; height: 100%; display: block; }
  .tile-info { flex: 1; min-width: 0; overflow: hidden; }
  .tile-name { font-family: var(--serif); font-weight: 500; font-size: 12.5px; }
  .tile-desc { font-size: 9.5px; color: var(--muted); font-style: italic;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tile.placed .tile-name { text-decoration: line-through; }

  /* Hint toggle (fountain step) */
  .hint-btn {
    display: flex; align-items: flex-start; gap: 8px;
    width: 100%; padding: 8px 10px; border: 1px solid var(--border-soft);
    background: var(--paper); border-radius: 3px;
    cursor: pointer; text-align: left; color: var(--ink);
    font-family: var(--sans); transition: all 0.1s;
    margin-bottom: 4px;
  }
  .hint-btn:hover { border-color: var(--water); background: var(--water-faint); }
  .hint-btn.active {
    background: var(--hint-bg); border-color: #d4c8a8;
  }
  .hint-btn .hint-title { font-size: 11.5px; font-weight: 600; margin-bottom: 1px; }
  .hint-btn .hint-short { font-size: 10.5px; color: var(--muted); }
  .hint-btn .hint-body {
    font-size: 11px; color: var(--ink); margin-top: 5px;
    line-height: 1.45; display: none;
  }
  .hint-btn.active .hint-body { display: block; }

  /* Slider */
  .slider-row { display: flex; align-items: center; gap: 12px; margin: 12px 0 8px; }
  .slider-row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .slider-row .num-display {
    width: 60px; padding: 5px 7px; font-size: 16px;
    font-family: var(--serif); font-weight: 600; text-align: center;
    border: 1px solid var(--border); border-radius: 3px; background: var(--paper);
  }

  /* Final result */
  .score-banner {
    display: flex; align-items: center; gap: 22px;
    padding: 12px 0 14px; margin-bottom: 12px;
    border-bottom: 1px solid var(--border-soft);
  }
  .score-num { font-family: var(--serif); font-size: 56px; font-weight: 500; color: var(--accent); line-height: 1; }
  .score-num small { font-size: 20px; color: var(--muted); }
  .grade { font-family: var(--serif); font-style: italic; font-size: 22px; }
  .grade-desc { font-size: 12px; color: var(--muted); }
  .breakdown {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    margin-bottom: 12px;
  }
  .breakdown-item {
    padding: 8px 10px; background: var(--panel);
    border-radius: 3px; border: 1px solid var(--border-soft);
  }
  .breakdown-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--muted); font-weight: 600; margin-bottom: 2px;
  }
  .breakdown-val { font-family: var(--mono); font-size: 13px; }
  .breakdown-val .sub { font-size: 10.5px; color: var(--muted); }

  /* Fade animations */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .fade-in { animation: fadeIn 700ms ease-out forwards; }
  @keyframes slowFade { from { opacity: 0; } to { opacity: 1; } }
  .slow-fade { animation: slowFade 1100ms ease-out forwards; }

  /* Compass / context labels on blank canvas */
  .canvas-context {
    font-family: var(--mono); font-size: 11px; fill: var(--muted);
    letter-spacing: 1px;
  }

  /* Action bar */
  .action-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="site-head">
    <div>
      <div class="site-title">Found <em>Pompeii</em></div>
      <div class="site-sub">a city-building game in four moves</div>
    </div>
    <div class="site-sub" id="step-indicator">step 0 of 4</div>
  </div>
  <div id="stepper-wrap"></div>
  <div class="body" id="app"></div>
</div>

// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════
const SVGNS = "http://www.w3.org/2000/svg";
function svg(tag, attrs = {}, children = []) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  children.forEach(c => e.appendChild(c));
  return e;
}
function svgText(content, attrs = {}) {
  const t = svg("text", attrs);
  t.textContent = content;
  return t;
}
function distM(a, b) { return Math.hypot(a.x - b.x, a.y - b.y) / UNIT_PER_M; }
function angleDeg(p1, p2) {
  return Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
}
function angleDiff(a, b) {
  let d = ((a - b) % 180 + 180) % 180;
  if (d > 90) d = 180 - d;
  return d;
}
function getSvgPt(svgEl, e) {
  const pt = svgEl.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  const ctm = svgEl.getScreenCTM();
  if (!ctm) return { x: 0, y: 0 };
  return pt.matrixTransform(ctm.inverse());
}

// Translate a path 'd' string by (dx, dy) — only handles M/L/C absolute commands
function translatePath(d, dx, dy) {
  return d.replace(/([MLC])\s*([-\d.,\s]+)/gi, (match, cmd, args) => {
    const nums = args.trim().split(/[\s,]+/).map(Number);
    const out = [];
    for (let i = 0; i < nums.length; i += 2) {
      out.push((nums[i] + dx).toFixed(2) + "," + (nums[i+1] + dy).toFixed(2));
    }
    return cmd + " " + out.join(" ");
  });
}

  stepperWrap.appendChild(renderStepper());

  // Two-pane body
  app.innerHTML = "";
  let panes;
  if (state.step === 0) panes = renderIntro();
  else if (state.step === 1) panes = renderAxes();
  else if (state.step === 2) panes = renderForum();
  else if (state.step === 3) panes = renderBuildings();
  else if (state.step === 4) panes = renderFountains();
  else if (state.step === 5) panes = renderResults();

  const left = document.createElement("div");
  left.className = "pane-left";
  left.appendChild(panes.left);

  const right = document.createElement("div");
  right.className = "pane-right";
  if (panes.right) {
    const shell = document.createElement("div");
    shell.className = "map-shell";
    shell.appendChild(panes.right);
    right.appendChild(shell);
  }

  app.appendChild(left);
  app.appendChild(right);
}

function renderStepper() {
  const d = document.createElement("div");
  d.className = "stepper";
  const labels = ["Intro", "Axes", "Forum", "Buildings", "Fountains", "Results"];
  labels.forEach((l, i) => {
    const t = document.createElement("span");
    t.className = "step-tag" + (i === state.step ? " active" : i < state.step ? " done" : "");
    t.textContent = `${i}. ${l}`;
    d.appendChild(t);
  });
  return d;
}

// ═══════════════════════════════════════════════════════════════════════════
// STEP 0 — INTRO
// ═══════════════════════════════════════════════════════════════════════════
function renderIntro() {
  const left = document.createElement("div");
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h2>Found a <em>Roman city</em> from scratch.</h2>
    <p class="lede">
      You are a Roman urbanist arriving on a fresh site. In four moves you will
      lay out the city's two main streets, choose where to place its forum, fit
      the civic buildings into the urban fabric, and finally distribute the
      public fountains.
    </p>
    <p class="lede">
      Each step is scored against the historical reality of <strong>Pompeii</strong>.
      Total possible: <b>100 points</b> across all four moves.
    </p>
    <button class="btn primary" id="btn-begin">Begin →</button>
  `;
  card.querySelector("#btn-begin").addEventListener("click", () => {
    state.step = 1; render();

  // Right pane: a teaser map showing the empty site
  const right = makeBlankCanvas(true);
  return { left, right };
}

// ═══════════════════════════════════════════════════════════════════════════
// STEP 1 — AXES (start from blank canvas)
// ═══════════════════════════════════════════════════════════════════════════
function renderAxes() {
  const stage =
    !state.cardoEnds ? "draw_cardo_p1" :
    state.cardoEnds.length === 1 ? "draw_cardo_p2" :
    !state.decumanusEnds ? "draw_dec_p1" :
    state.decumanusEnds.length === 1 ? "draw_dec_p2" :
    !state.axesRevealed ? "ready_to_reveal" : "revealed";

  const briefByStage = {
    draw_cardo_p1: "Click to mark the <strong>north end</strong> of your cardo (the main north–south street). The canvas shows orientation cues — Roma is to the northwest, Vesuvius to the north.",
    draw_cardo_p2: "Click the <strong>south end</strong> of your cardo. A Roman cardo runs roughly north–south, often along high ground.",
    draw_dec_p1: "Now mark the <strong>west end</strong> of your decumanus (the main east–west street).",
    draw_dec_p2: "Click the <strong>east end</strong> of your decumanus.",
    ready_to_reveal: "Both axes drawn. <strong>Reveal Pompeii</strong> to compare with the historical street network.",
    revealed: "The street network has appeared. Compare your axes (red) with Pompeii's (green).",
  };

  const left = document.createElement("div");

  const titleCard = document.createElement("div");
  titleCard.className = "card";
  titleCard.innerHTML = `
    <div class="step-title-row">
      <h2><em>Trace</em> the cardo & decumanus.</h2>
      <span class="step-num">01 / 04</span>
    </div>
    <p class="brief">${briefByStage[stage]}</p>
  `;
  left.appendChild(titleCard);

  const hintCard = document.createElement("div");
  hintCard.className = "card hint-tone";
  hintCard.innerHTML = `
    <h3>Hints</h3>
    <ul class="hint-list">
      <li>The cardo runs roughly N–S, often along high ground for water gravity.</li>
      <li>The decumanus runs E–W, ideally connecting two main gates.</li>
      <li>Their crossing anchors the city; forum may sit nearby but not dead-on.</li>
    </ul>
  `;
  left.appendChild(hintCard);

  const actionCard = document.createElement("div");
  actionCard.className = "card";
  actionCard.appendChild(buildAxesActionPanel(stage));
  left.appendChild(actionCard);

  const right = buildAxesMap();
  return { left, right };
}

function buildAxesActionPanel(stage) {
  const wrap = document.createElement("div");
  let html = "";
  if (stage === "draw_cardo_p1" || stage === "draw_cardo_p2") {
    html = `<div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px">
      Drawing <b style="color:var(--accent)">cardo</b> · point ${state.cardoEnds ? state.cardoEnds.length + 1 : 1} of 2.
    </div>`;
  } else if (stage === "draw_dec_p1" || stage === "draw_dec_p2") {
    html = `<div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px">
      Cardo set. Drawing <b style="color:var(--accent)">decumanus</b> · point ${state.decumanusEnds ? state.decumanusEnds.length + 1 : 1} of 2.
    </div>`;
  } else if (stage === "ready_to_reveal") {
    html = `
      <div style="font-size:12px;color:var(--ink);line-height:1.5;margin-bottom:10px">
        Both axes drawn. Click below to reveal Pompeii — the city's wall, gates and street grid will appear.
      </div>
      <button class="btn primary" id="btn-reveal" style="width:100%">Reveal Pompeii</button>
    `;
  } else if (stage === "revealed") {
    const fb = computeAxesFeedback();
    state.axesScore = fb.score;  // record
    const tone = fb.score >= 14 ? "" : " warning";
    html = `
      <div class="feedback-card${tone}">
        <h4>Comparison <span class="step-score">${fb.score} / 20</span></h4>
        <p>Cardo: <b>${fb.cardoOff}°</b> off, ~<b>${fb.cardoDistM} m</b> from centre.</p>
        <p>Decumanus: <b>${fb.decOff}°</b> off, ~<b>${fb.decDistM} m</b>.</p>
      </div>
      <button class="btn primary" id="btn-next" style="width:100%">Continue → Forum</button>
    `;
  }
  if (stage !== "revealed") {
    html += `<button class="btn tiny" id="btn-reset-axes" style="margin-top:8px">Start over</button>`;
  }
  wrap.innerHTML = html;

  const reveal = wrap.querySelector("#btn-reveal");
  if (reveal) reveal.addEventListener("click", () => { state.axesRevealed = true; render(); });
  const next = wrap.querySelector("#btn-next");
  if (next) next.addEventListener("click", () => { state.step = 2; render(); });
  const reset = wrap.querySelector("#btn-reset-axes");
  if (reset) reset.addEventListener("click", () => {
    state.cardoEnds = null; state.decumanusEnds = null;
    state.axesRevealed = false;
    render();
  });
  return wrap;
}

function computeAxesFeedback() {
  const userCardo = state.cardoEnds;
  const userDec = state.decumanusEnds;
  const cardoUserAng = angleDeg(userCardo[0], userCardo[1]);
  const cardoTrueAng = angleDeg({x: TRUTH_CARDO.x1, y: TRUTH_CARDO.y1}, {x: TRUTH_CARDO.x2, y: TRUTH_CARDO.y2});
  const decUserAng = angleDeg(userDec[0], userDec[1]);
  const decTrueAng = angleDeg({x: TRUTH_DECUMANUS.x1, y: TRUTH_DECUMANUS.y1}, {x: TRUTH_DECUMANUS.x2, y: TRUTH_DECUMANUS.y2});
  const cardoUserMid = { x: (userCardo[0].x + userCardo[1].x) / 2, y: (userCardo[0].y + userCardo[1].y) / 2 };
  const cardoTrueMid = { x: (TRUTH_CARDO.x1 + TRUTH_CARDO.x2) / 2, y: (TRUTH_CARDO.y1 + TRUTH_CARDO.y2) / 2 };
  const decUserMid = { x: (userDec[0].x + userDec[1].x) / 2, y: (userDec[0].y + userDec[1].y) / 2 };
  const decTrueMid = { x: (TRUTH_DECUMANUS.x1 + TRUTH_DECUMANUS.x2) / 2, y: (TRUTH_DECUMANUS.y1 + TRUTH_DECUMANUS.y2) / 2 };
  const cardoOff = angleDiff(cardoUserAng, cardoTrueAng);
  const decOff = angleDiff(decUserAng, decTrueAng);
  const cardoDist = distM(cardoUserMid, cardoTrueMid);
  const decDist = distM(decUserMid, decTrueMid);
  // Score: angles (max 10) + distance (max 10), each axis half
  // Angle: 0° = 5pts, 30°+ = 0pts, linear
  // Distance: 0m = 5pts, 300m+ = 0pts, linear
  const angScore = Math.max(0, 5 - cardoOff/30 * 5) + Math.max(0, 5 - decOff/30 * 5);
  const distScore = Math.max(0, 5 - cardoDist/300 * 5) + Math.max(0, 5 - decDist/300 * 5);
  const score = Math.round(angScore + distScore);
  return {
    cardoOff: cardoOff.toFixed(1),
    cardoDistM: Math.round(cardoDist),
    decOff: decOff.toFixed(1),
    decDistM: Math.round(decDist),
    score,
  };
}

// Build a blank canvas with orientation + geographic cues
function makeBlankCanvas(teaser) {
  const root = svg("svg", {
    viewBox: `${VB.x} ${VB.y} ${VB.w} ${VB.h}`,
    xmlns: SVGNS, preserveAspectRatio: "xMidYMid meet",
  });
  root.style.maxWidth = "100%"; root.style.maxHeight = "100%";
  root.style.width = "auto"; root.style.height = "auto";
  root.style.background = "#fffdf7";

  // Faint frame
  root.appendChild(svg("rect", {
    x: 2, y: 2, width: VB.w - 4, height: VB.h - 4,
    fill: "none", stroke: "#d8ccb4", "stroke-width": 0.6, "stroke-dasharray": "4,3",
  }));

  // North compass arrow (top-right corner)
  const nx = VB.w - 60, ny = 60;
  const nGroup = svg("g");
  nGroup.style.pointerEvents = "none";
  // Arrow shaft
  nGroup.appendChild(svg("line", { x1: nx, y1: ny + 22, x2: nx, y2: ny - 18,
    stroke: "#8a7d6b", "stroke-width": 1.2, "stroke-linecap": "round" }));
  // Arrowhead (pointing up = N)
  nGroup.appendChild(svg("polygon", {
    points: `${nx - 5},${ny - 12} ${nx},${ny - 22} ${nx + 5},${ny - 12}`,
    fill: "#8a7d6b",
  }));
  nGroup.appendChild(svgText("N", {
    x: nx, y: ny - 28, "text-anchor": "middle",
    "font-size": 12, fill: "#8a7d6b", "font-weight": 700,
    "font-family": "'DM Mono', monospace",
  }));
  // S marker
  nGroup.appendChild(svgText("S", {
    x: nx, y: ny + 36, "text-anchor": "middle",
    "font-size": 10, fill: "#c8bca6", "font-weight": 600,
    "font-family": "'DM Mono', monospace",
  }));
  root.appendChild(nGroup);

  // ROMA marker — top-left, with arrow pointing NW out of frame
  const rx = 50, ry = 80;
  const rGroup = svg("g");
  rGroup.style.pointerEvents = "none";
  rGroup.appendChild(svgText("ROMA", {
    x: rx, y: ry - 14, "text-anchor": "start",
    "font-size": 13, fill: "#8a7d6b", "font-weight": 700,
    "font-family": "'Cormorant Garamond', serif", "font-style": "italic",
  }));
  rGroup.appendChild(svgText("≈ 240 km NW", {
    x: rx, y: ry + 2, "text-anchor": "start",
    "font-size": 9, fill: "#a99c84",
    "font-family": "'DM Mono', monospace",
  }));
  // Diagonal arrow pointing NW (up-left, off-canvas direction)
  rGroup.appendChild(svg("line", {
    x1: rx + 70, y1: ry + 8, x2: rx + 30, y2: ry + 30,
    stroke: "#a99c84", "stroke-width": 1, "stroke-linecap": "round",
  }));
  rGroup.appendChild(svg("polygon", {
    points: `${rx + 28},${ry + 30} ${rx + 38},${ry + 22} ${rx + 38},${ry + 35}`,
    fill: "#a99c84",
  }));
  root.appendChild(rGroup);

  // VESUVIUS — top center, arrow pointing N (off canvas)
  const vx = VB.w / 2, vy = 60;
  const vGroup = svg("g");
  vGroup.style.pointerEvents = "none";
  // Mountain symbol
  vGroup.appendChild(svg("polygon", {
    points: `${vx - 15},${vy + 6} ${vx},${vy - 12} ${vx + 15},${vy + 6}`,
    fill: "none", stroke: "#a99c84", "stroke-width": 1,
  }));
  vGroup.appendChild(svgText("Mt. Vesuvius", {
    x: vx, y: vy + 22, "text-anchor": "middle",
    "font-size": 10, fill: "#8a7d6b", "font-weight": 600,
    "font-family": "'Cormorant Garamond', serif", "font-style": "italic",
  }));
  vGroup.appendChild(svgText("≈ 8 km N", {
    x: vx, y: vy + 34, "text-anchor": "middle",
    "font-size": 8, fill: "#a99c84",
    "font-family": "'DM Mono', monospace",
  }));
  root.appendChild(vGroup);

  // Bay of Naples (south)
  const bGroup = svg("g");
  bGroup.style.pointerEvents = "none";
  bGroup.appendChild(svgText("Bay of Naples", {
    x: 70, y: VB.h - 30, "text-anchor": "start",
    "font-size": 11, fill: "#8a7d6b",
    "font-family": "'Cormorant Garamond', serif", "font-style": "italic",
  }));
  bGroup.appendChild(svgText("≈ 700 m S → coast", {
    x: 70, y: VB.h - 16, "text-anchor": "start",
    "font-size": 8, fill: "#a99c84",
    "font-family": "'DM Mono', monospace",
  }));
  // Wavy line for water
  bGroup.appendChild(svg("path", {
    d: `M 200,${VB.h - 25} q 10,-5 20,0 t 20,0 t 20,0 t 20,0 t 20,0 t 20,0`,
    fill: "none", stroke: "#a3ccd8", "stroke-width": 1.2,
  }));
  root.appendChild(bGroup);

  if (teaser) {
    // Teaser hint text in the centre
    const t = svgText("Your blank site.", {
      x: VB.w / 2, y: VB.h / 2 - 14, "text-anchor": "middle",
      "font-size": 22, fill: "#c8bca6", "font-weight": 500,
      "font-family": "'Cormorant Garamond', serif", "font-style": "italic",
    });
    t.style.pointerEvents = "none";
    root.appendChild(t);
    const t2 = svgText("Begin tracing the city's two main streets.", {
      x: VB.w / 2, y: VB.h / 2 + 12, "text-anchor": "middle",
      "font-size": 11, fill: "#c8bca6",
      "font-family": "'DM Sans', sans-serif",
    });
    t2.style.pointerEvents = "none";
    root.appendChild(t2);
  }

  return root;
}

function buildAxesMap() {
  // Step 1 starts on a blank canvas with orientation cues — no base map until reveal
  const root = makeBlankCanvas(false);

  // Reveal: fade in the street network only (no walls, no buildings)
  if (state.axesRevealed) {
    const streetsG = svg("g", { class: "slow-fade" });
    streetsG.style.pointerEvents = "none";
    STREET_PATHS.forEach(d => {
      streetsG.appendChild(svg("path", {
        d, fill: "none", stroke: "#3d3425", "stroke-width": 0.5,
        "stroke-linejoin": "round", opacity: 0.55,
      }));
    });
    root.appendChild(streetsG);
  }

  // Hover preview line
  const hoverLine = svg("line", {
    stroke: "#c4553e", "stroke-width": 1.5, opacity: 0.5,
    "stroke-dasharray": "3,2", visibility: "hidden",
  });
  hoverLine.style.pointerEvents = "none";
  root.appendChild(hoverLine);

  // User's lines + endpoints
  if (state.cardoEnds && state.cardoEnds.length === 2) {
    drawAxisLine(root, state.cardoEnds[0], state.cardoEnds[1], "#c4553e", "C");
  } else if (state.cardoEnds && state.cardoEnds.length === 1) {
    drawEndpoint(root, state.cardoEnds[0], "#c4553e");
  }
  if (state.decumanusEnds && state.decumanusEnds.length === 2) {
    drawAxisLine(root, state.decumanusEnds[0], state.decumanusEnds[1], "#c4553e", "D");
  } else if (state.decumanusEnds && state.decumanusEnds.length === 1) {
    drawEndpoint(root, state.decumanusEnds[0], "#c4553e");
  }

  // Truth axes (only after reveal) — GREEN to indicate "correct"
  if (state.axesRevealed) {
    const tg = svg("g", { class: "fade-in" });
    drawAxisLine(tg, { x: TRUTH_CARDO.x1, y: TRUTH_CARDO.y1 },
                     { x: TRUTH_CARDO.x2, y: TRUTH_CARDO.y2 }, "#5a8a5e", "Cardo");
    drawAxisLine(tg, { x: TRUTH_DECUMANUS.x1, y: TRUTH_DECUMANUS.y1 },
                     { x: TRUTH_DECUMANUS.x2, y: TRUTH_DECUMANUS.y2 }, "#5a8a5e", "Decumanus");
    root.appendChild(tg);
  }

  // Add a "click to begin" hint when nothing's drawn yet
  if (!state.axesRevealed && !state.cardoEnds) {
    const t = svgText("CLICK ANYWHERE TO BEGIN", {
      x: VB.w / 2, y: VB.h / 2 - 10, "text-anchor": "middle",
      "font-size": 12, fill: "#c8bca6", "font-weight": 600,
      "font-family": "'DM Mono', monospace", "letter-spacing": "2",
    });
    t.style.pointerEvents = "none";
    root.appendChild(t);
    const t2 = svgText("(orientation cues mark the world around your site)", {
      x: VB.w / 2, y: VB.h / 2 + 8, "text-anchor": "middle",
      "font-size": 9, fill: "#c8bca6", "font-style": "italic",
      "font-family": "'DM Sans', sans-serif",
    });
    t2.style.pointerEvents = "none";
    root.appendChild(t2);
  }

  // Click handler
  root.style.cursor = state.axesRevealed ? "default" : "crosshair";
  if (!state.axesRevealed) {
    root.addEventListener("click", (e) => {
      const p = getSvgPt(root, e);
      // Use larger bounds for axis canvas (whole canvas, not just city bounds)
      if (p.x < 0 || p.x > VB.w || p.y < 0 || p.y > VB.h) return;
      const pt = { x: +p.x.toFixed(1), y: +p.y.toFixed(1) };
      if (!state.cardoEnds) state.cardoEnds = [pt];
      else if (state.cardoEnds.length === 1) state.cardoEnds.push(pt);
      else if (!state.decumanusEnds) state.decumanusEnds = [pt];
      else if (state.decumanusEnds.length === 1) state.decumanusEnds.push(pt);
      render();
    });
    root.addEventListener("mousemove", (e) => {
      const p = getSvgPt(root, e);
      let from = null;
      if (state.cardoEnds && state.cardoEnds.length === 1) from = state.cardoEnds[0];
      else if (state.decumanusEnds && state.decumanusEnds.length === 1) from = state.decumanusEnds[0];
      if (from) {
        hoverLine.setAttribute("x1", from.x);
        hoverLine.setAttribute("y1", from.y);
        hoverLine.setAttribute("x2", p.x);
        hoverLine.setAttribute("y2", p.y);
        hoverLine.setAttribute("visibility", "visible");
      } else hoverLine.setAttribute("visibility", "hidden");
    });
  }
  return root;
}

function drawEndpoint(parent, p, color) {
  parent.appendChild(svg("circle", {
    cx: p.x, cy: p.y, r: 3.5,
    fill: color, stroke: "white", "stroke-width": 1,
  }));
}
function drawAxisLine(parent, a, b, color, label) {
  parent.appendChild(svg("line", {
    x1: a.x, y1: a.y, x2: b.x, y2: b.y,
    stroke: color, "stroke-width": 2.4, opacity: 0.85,
    "stroke-linecap": "round",
  }));
  drawEndpoint(parent, a, color);
  drawEndpoint(parent, b, color);
  if (label) {
    parent.appendChild(svgText(label, {
      x: (a.x + b.x) / 2 + 8, y: (a.y + b.y) / 2 - 4,
      "font-size": 9, fill: color, "font-weight": 600,
      "font-family": "'DM Mono', monospace",
    }));
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// STEP 2 — FORUM placement
// ═══════════════════════════════════════════════════════════════════════════
function renderForum() {
  const stage = !state.forumPos ? "place" :
                !state.forumRevealed ? "ready" : "revealed";

  const briefByStage = {
    place: "Click on the street network to place your <strong>forum</strong> — Pompeii's civic and religious heart.",
    ready: "Forum centre placed. <strong>Reveal</strong> the historical position to compare.",
    revealed: "The historical forum sits in the SW quadrant — older Greek city plus a slight rise.",
  };

  const left = document.createElement("div");

  const titleCard = document.createElement("div");
  titleCard.className = "card";
  titleCard.innerHTML = `
    <div class="step-title-row">
      <h2>Place the <em>forum</em>.</h2>
      <span class="step-num">02 / 04</span>
    </div>
    <p class="brief">${briefByStage[stage]}</p>
  `;
  left.appendChild(titleCard);

  const hintCard = document.createElement("div");
  hintCard.className = "card hint-tone";
  hintCard.innerHTML = `
    <h3>Considerations</h3>
    <ul class="hint-list">
      <li><b>Protection of the gods</b> — temples need axial dominance, often on a rise.</li>
      <li><b>Commercial gravity</b> — must absorb daily traders & magistrates.</li>
      <li><b>Visibility & access</b> — reachable from main streets, visible from afar.</li>
      <li>It need not sit on the cardo–decumanus crossing. In Pompeii it doesn't.</li>
    </ul>
  `;
  left.appendChild(hintCard);

  const actionCard = document.createElement("div");
  actionCard.className = "card";
  actionCard.appendChild(buildForumActionPanel(stage));
  left.appendChild(actionCard);

  const right = buildForumMap();
  return { left, right };
}

function buildForumActionPanel(stage) {
  const wrap = document.createElement("div");
  let html = "";
  if (stage === "place") {
    html = `<p style="font-size:12px;color:var(--muted)">Click anywhere on the map to set the forum's centre. You can move it before revealing.</p>`;
  } else if (stage === "ready") {
    html = `
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">
        Click the map again to move it, or reveal Pompeii's forum.
      </p>
      <button class="btn primary" id="btn-reveal" style="width:100%">Reveal Pompeii's forum</button>
    `;
  } else if (stage === "revealed") {
    const dM = Math.round(distM(state.forumPos, { x: TRUTH_FORUM.cx, y: TRUTH_FORUM.cy }));
    // Forum score: 15 max. <50m = 15, 300m = 0, linear
    const fScore = Math.max(0, Math.round(15 * (1 - dM/300)));
    state.forumScore = fScore;
    const close = dM < 100;
    html = `
      <div class="feedback-card${close ? "" : " warning"}">
        <h4>${close ? "Close to the mark." : "A reasonable guess."} <span class="step-score">${fScore} / 15</span></h4>
        <p>Your forum sits <b>${dM} m</b> from the historical centre.</p>
        <p style="margin-top:6px;font-size:11px;color:var(--muted)">
          The Pompeian forum predates Roman colonisation — it sits in the older
          Oscan quarter, off the cardo–decumanus crossing.
        </p>
      </div>
      <button class="btn primary" id="btn-next" style="width:100%">Continue → Buildings</button>
    `;
  }
  wrap.innerHTML = html;
  const reveal = wrap.querySelector("#btn-reveal");
  if (reveal) reveal.addEventListener("click", () => { state.forumRevealed = true; render(); });
  const next = wrap.querySelector("#btn-next");
  if (next) next.addEventListener("click", () => { state.step = 3; render(); });
  return wrap;
}

function buildForumMap() {
  const root = makeBaseMap("streets");
  // No user red axes anymore — just truth in green for context
  drawAxisLine(root, { x: TRUTH_CARDO.x1, y: TRUTH_CARDO.y1 },
                     { x: TRUTH_CARDO.x2, y: TRUTH_CARDO.y2 }, "#5a8a5e", null);
  drawAxisLine(root, { x: TRUTH_DECUMANUS.x1, y: TRUTH_DECUMANUS.y1 },
                     { x: TRUTH_DECUMANUS.x2, y: TRUTH_DECUMANUS.y2 }, "#5a8a5e", null);

  // User forum
  if (state.forumPos) {
    const p = state.forumPos;
    const w = TRUTH_FORUM.w, h = TRUTH_FORUM.h;
    root.appendChild(svg("rect", {
      x: p.x - w/2, y: p.y - h/2, width: w, height: h,
      fill: "rgba(196,85,62,0.25)", stroke: "#c4553e", "stroke-width": 1.5,
    }));
    root.appendChild(svgText("FORUM", {
      x: p.x, y: p.y + 2, "text-anchor": "middle",
      "font-size": 8, fill: "#c4553e", "font-weight": 700,
      "font-family": "'DM Mono', monospace",
    }));
  }

  // Truth forum reveal — GREEN, no surrounding buildings (suspense for step 3)
  if (state.forumRevealed) {
    const g = svg("g", { class: "fade-in" });
    g.appendChild(svg("rect", {
      x: TRUTH_FORUM.x, y: TRUTH_FORUM.y,
      width: TRUTH_FORUM.w, height: TRUTH_FORUM.h,
      fill: "rgba(90,138,94,0.25)", stroke: "#5a8a5e", "stroke-width": 1.5,
    }));
    g.appendChild(svgText("Forum (historical)", {
      x: TRUTH_FORUM.cx, y: TRUTH_FORUM.y - 6,
      "text-anchor": "middle",
      "font-size": 8, fill: "#5a8a5e", "font-weight": 600,
      "font-family": "'DM Sans', sans-serif", "font-style": "italic",
    }));
    if (state.forumPos) {
      g.appendChild(svg("line", {
        x1: state.forumPos.x, y1: state.forumPos.y,
        x2: TRUTH_FORUM.cx, y2: TRUTH_FORUM.cy,
        stroke: "#5a8a5e", "stroke-width": 0.8,
        "stroke-dasharray": "3,3", opacity: 0.6,
      }));
    }
    root.appendChild(g);
  }

  // Click handler
  if (!state.forumRevealed) {
    root.style.cursor = "crosshair";
    root.addEventListener("click", (e) => {
      const p = getSvgPt(root, e);
      if (p.x < CITY_BOUNDS.minX || p.x > CITY_BOUNDS.maxX ||
          p.y < CITY_BOUNDS.minY || p.y > CITY_BOUNDS.maxY) return;
      state.forumPos = { x: +p.x.toFixed(1), y: +p.y.toFixed(1) };
      render();
    });
  }
  return root;
}

// ═══════════════════════════════════════════════════════════════════════════
// STEP 3 — BUILDINGS (puzzle drag)
// ═══════════════════════════════════════════════════════════════════════════
function renderBuildings() {
  const placedCount = Object.keys(state.placedBuildings).length;
  const totalToPlace = Object.keys(PUZZLE_BUILDINGS).length;
  const allPlaced = placedCount === totalToPlace;
  const stage = !allPlaced ? "placing" :
                !state.buildingsRevealed ? "ready" : "revealed";

  const briefByStage = {
    placing: `Drag puzzle pieces onto the map. <strong>${placedCount}/${totalToPlace}</strong> placed. Reserve a quadrant for the <em>amphitheatre and large public buildings</em>.`,
    ready: "All pieces placed. Reveal Pompeii's actual positions.",
    revealed: "Brown ghosts mark your guesses; coloured pieces are the truth.",
  };

  const left = document.createElement("div");

  const titleCard = document.createElement("div");
  titleCard.className = "card";
  titleCard.innerHTML = `
    <div class="step-title-row">
      <h2>Place the <em>civic buildings</em>.</h2>
      <span class="step-num">03 / 04</span>
    </div>
    <p class="brief">${briefByStage[stage]}</p>
  `;
  left.appendChild(titleCard);

  // Tile tray
  const trayCard = document.createElement("div");
  trayCard.className = "card";
  trayCard.innerHTML = `
    <h3>Buildings · ${placedCount}/${totalToPlace}</h3>
    <p style="font-size:10.5px;color:var(--muted);margin-bottom:4px">Drag onto map. Click a placed piece to remove it.</p>
    <div class="tile-tray" id="tile-tray"></div>
  `;
  trayCard.querySelector("#tile-tray").appendChild(buildTileTray());
  left.appendChild(trayCard);

  const actionCard = document.createElement("div");
  actionCard.className = "card";
  actionCard.appendChild(buildBuildingsActionPanel(stage));
  left.appendChild(actionCard);

  const right = buildBuildingsMap();
  return { left, right };
}

function buildTileTray() {
  const frag = document.createDocumentFragment();
  Object.entries(PUZZLE_BUILDINGS).forEach(([id, b]) => {
    const placed = !!state.placedBuildings[id];
    const tile = document.createElement("div");
    tile.className = "tile" + (placed ? " placed" : "");
    tile.dataset.id = id;
    tile.draggable = !placed && !state.buildingsRevealed;
    // Build mini SVG for thumbnail
    const [bx, by, bw, bh] = b.bbox;
    const pad = Math.max(bw, bh) * 0.15;
    const vbX = bx - pad, vbY = by - pad, vbW = bw + 2*pad, vbH = bh + 2*pad;
    const pathsHtml = b.paths.map(d =>
      `<path d="${d}" fill="rgba(196,85,62,0.55)" stroke="#c4553e" stroke-width="0.8" stroke-linejoin="round"/>`
    ).join("");
    tile.innerHTML = `
      <div class="tile-thumb">
        <svg viewBox="${vbX} ${vbY} ${vbW} ${vbH}" preserveAspectRatio="xMidYMid meet">${pathsHtml}</svg>
      </div>
      <div class="tile-info">
        <div class="tile-name">${b.name}</div>
        <div class="tile-desc">${b.desc}</div>
      </div>
    `;
    if (!placed && !state.buildingsRevealed) {
      tile.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text/plain", id);
        e.dataTransfer.effectAllowed = "move";
        tile.classList.add("dragging");
      });
      tile.addEventListener("dragend", () => tile.classList.remove("dragging"));
    }
    frag.appendChild(tile);
  });
  return frag;
}

function buildBuildingsActionPanel(stage) {
  const wrap = document.createElement("div");
  let html = "";
  if (stage === "placing") {
    const remaining = Object.entries(PUZZLE_BUILDINGS)
      .filter(([id]) => !state.placedBuildings[id])
      .map(([_, b]) => b.name).join(", ");
    html = `
      <h3>To place</h3>
      <p style="font-size:11.5px;color:var(--muted);margin:0">${remaining || "all done!"}</p>
    `;
  } else if (stage === "ready") {
    html = `<button class="btn primary" id="btn-reveal" style="width:100%">Reveal Pompeii's buildings</button>`;
  } else if (stage === "revealed") {
    // Score: 30 max, divided across 9 buildings. Each: <50m=full, 250m=0, linear
    const totalBuildings = Object.keys(PUZZLE_BUILDINGS).length;
    const perBuilding = 30 / totalBuildings;
    let totalScore = 0;
    const items = Object.entries(PUZZLE_BUILDINGS).map(([id, b]) => {
      const u = state.placedBuildings[id];
      const dM = Math.round(distM(u, { x: b.cx, y: b.cy }));
      const sc = Math.max(0, perBuilding * (1 - dM/250));
      totalScore += sc;
      const color = dM < 80 ? "var(--ok)" : dM < 200 ? "var(--accent)" : "var(--muted)";
      return `<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px dotted var(--border-soft)">
        <span style="font-family:var(--serif);font-weight:500">${b.name}</span>
        <span style="color:${color};font-family:var(--mono);font-size:10.5px">${dM} m</span>
      </div>`;
    }).join("");
    state.buildingsScore = Math.round(totalScore);
    html = `
      <div class="feedback-card${state.buildingsScore < 18 ? " warning" : ""}">
        <h4>Result <span class="step-score">${state.buildingsScore} / 30</span></h4>
      </div>
      <h3>Distance from truth</h3>
      <div style="margin-bottom:10px">${items}</div>
      <button class="btn primary" id="btn-next" style="width:100%">Continue → Fountains</button>
    `;
  }
  wrap.innerHTML = html;
  const reveal = wrap.querySelector("#btn-reveal");
  if (reveal) reveal.addEventListener("click", () => { state.buildingsRevealed = true; render(); });
  const next = wrap.querySelector("#btn-next");
  if (next) next.addEventListener("click", () => { state.step = 4; render(); });
  return wrap;
}

function buildBuildingsMap() {
  const root = makeBaseMap("streets");
  // Truth axes — green
  drawAxisLine(root, { x: TRUTH_CARDO.x1, y: TRUTH_CARDO.y1 },
                     { x: TRUTH_CARDO.x2, y: TRUTH_CARDO.y2 }, "#5a8a5e", null);
  drawAxisLine(root, { x: TRUTH_DECUMANUS.x1, y: TRUTH_DECUMANUS.y1 },
                     { x: TRUTH_DECUMANUS.x2, y: TRUTH_DECUMANUS.y2 }, "#5a8a5e", null);
  // Truth forum — green rectangle (kept from step 2)
  root.appendChild(svg("rect", {
    x: TRUTH_FORUM.x, y: TRUTH_FORUM.y,
    width: TRUTH_FORUM.w, height: TRUTH_FORUM.h,
    fill: "rgba(90,138,94,0.18)", stroke: "#5a8a5e", "stroke-width": 1,
  }));
  root.appendChild(svgText("Forum", {
    x: TRUTH_FORUM.cx, y: TRUTH_FORUM.y - 4,
    "text-anchor": "middle",
    "font-size": 7, fill: "#5a8a5e", "font-weight": 600,
    "font-family": "'DM Sans', sans-serif", "font-style": "italic",
  }));

  // Drop zone
  if (!state.buildingsRevealed) {
    root.addEventListener("dragover", (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
    root.addEventListener("drop", (e) => {
      e.preventDefault();
      const id = e.dataTransfer.getData("text/plain");
      if (!id || !PUZZLE_BUILDINGS[id]) return;
      const p = getSvgPt(root, e);
      if (p.x < CITY_BOUNDS.minX || p.x > CITY_BOUNDS.maxX ||
          p.y < CITY_BOUNDS.minY || p.y > CITY_BOUNDS.maxY) return;
      state.placedBuildings[id] = { x: +p.x.toFixed(1), y: +p.y.toFixed(1) };
      render();
    });
  }

  // Render placed user buildings (translated to drop position)
  Object.entries(state.placedBuildings).forEach(([id, p]) => {
    const b = PUZZLE_BUILDINGS[id];
    if (!b) return;
    const dx = p.x - b.cx;
    const dy = p.y - b.cy;
    const g = svg("g");
    if (!state.buildingsRevealed) {
      g.style.cursor = "pointer";
      g.addEventListener("click", () => {
        delete state.placedBuildings[id];
        render();
      });
    }
    b.paths.forEach(d => {
      const translated = translatePath(d, dx, dy);
      g.appendChild(svg("path", {
        d: translated,
        fill: "rgba(196,85,62,0.55)", stroke: "#c4553e", "stroke-width": 0.8,
        "stroke-linejoin": "round",
      }));
    });
    g.appendChild(svgText(b.name, {
      x: p.x, y: p.y - b.bbox[3]/2 - 3, "text-anchor": "middle",
      "font-size": 6, fill: "#c4553e", "font-weight": 700,
      "font-family": "'DM Sans', sans-serif",
    }));
    root.appendChild(g);
  });

  // Truth buildings (reveal)
  if (state.buildingsRevealed) {
    const tg = svg("g", { class: "fade-in" });
    Object.entries(PUZZLE_BUILDINGS).forEach(([id, b]) => {
      b.paths.forEach(d => {
        tg.appendChild(svg("path", {
          d, fill: "rgba(107,90,61,0.45)", stroke: "#6b5a3d",
          "stroke-width": 0.8, "stroke-linejoin": "round",
        }));
      });
      tg.appendChild(svgText(b.name, {
        x: b.cx, y: b.cy + b.bbox[3]/2 + 6, "text-anchor": "middle",
        "font-size": 5.5, fill: "#6b5a3d", "font-weight": 600,
        "font-family": "'DM Sans', sans-serif", "font-style": "italic",
      }));
      const u = state.placedBuildings[id];
      if (u) {
        tg.appendChild(svg("line", {
          x1: u.x, y1: u.y, x2: b.cx, y2: b.cy,
          stroke: "#5a8a5e", "stroke-width": 0.6,
          "stroke-dasharray": "2,2", opacity: 0.55,
        }));
      }
    });
    root.appendChild(tg);
  }
  return root;
}

// ═══════════════════════════════════════════════════════════════════════════
// STEP 4 — FOUNTAINS
// ═══════════════════════════════════════════════════════════════════════════
function renderFountains() {
  const stage = !state.fountainGuessLocked ? "guessing" :
                !state.pinsSubmitted ? "placing" : "submitted";
  const allowed = state.fountainGuess;

  const left = document.createElement("div");

  const titleCard = document.createElement("div");
  titleCard.className = "card";
  titleCard.innerHTML = `
    <div class="step-title-row">
      <h2>Distribute the <em>fountains</em>.</h2>
      <span class="step-num">04 / 04</span>
    </div>
    <p class="brief">${
      stage === "guessing" ? "How many public fountains supplied Pompeii? Your guess sets how many pins you can place." :
      stage === "placing" ? `Guessed <strong>${allowed}</strong>. Click the map to place pins. <strong>${state.pins.length}/${allowed}</strong> placed.` :
      "Submitted. Historical fountains in blue; matched pairs linked in green."
    }</p>
  `;
  left.appendChild(titleCard);

  const actionCard = document.createElement("div");
  actionCard.className = "card";
  actionCard.appendChild(buildFountainsActionPanel(stage));
  left.appendChild(actionCard);

  // Hint toggles (only during placing/guessing)
  if (stage !== "submitted") {
    const hintsCard = document.createElement("div");
    hintsCard.className = "card";
    hintsCard.innerHTML = `
      <h3>Hints — toggle to see overlays</h3>
      <div id="hint-list-wrap"></div>
    `;
    const wrap = hintsCard.querySelector("#hint-list-wrap");
    FOUNTAIN_HINTS.forEach(h => {
      const btn = document.createElement("button");
      btn.className = "hint-btn" + (state.activeFountainHints.includes(h.id) ? " active" : "");
      btn.innerHTML = `
        <div style="flex:1">
          <div class="hint-title">${h.title}</div>
          <div class="hint-short">${h.short}</div>
          <div class="hint-body">${h.body}</div>
        </div>
      `;
      btn.addEventListener("click", () => {
        if (state.activeFountainHints.includes(h.id)) {
          state.activeFountainHints = state.activeFountainHints.filter(x => x !== h.id);
        } else {
          state.activeFountainHints.push(h.id);
        }
        render();
      });
      wrap.appendChild(btn);
    });
    left.appendChild(hintsCard);
  }

  const right = buildFountainsMap(stage);
  return { left, right };
}

function buildFountainsActionPanel(stage) {
  const wrap = document.createElement("div");
  let html = "";
  if (stage === "guessing") {
    html = `
      <h3>How many public fountains?</h3>
      <p style="font-size:11.5px;color:var(--muted);margin-bottom:6px">
        Your guess determines how many pins you'll be allowed to place.
      </p>
      <div class="slider-row">
        <input type="range" id="g-range" min="0" max="100" step="1" value="${state.fountainGuess}">
        <input type="number" id="g-num" min="0" max="100" value="${state.fountainGuess}" class="num-display">
      </div>
      <button class="btn primary" id="btn-lock" style="width:100%;margin-top:6px">Lock guess & start placing</button>
    `;
  } else if (stage === "placing") {
    const remaining = state.fountainGuess - state.pins.length;
    html = `
      <h3>Pins left: ${remaining}</h3>
      <p style="font-size:11.5px;color:var(--muted);margin-bottom:10px">
        Click the map to drop a pin. Click a pin to remove it.
      </p>
      <button class="btn primary" id="btn-submit" style="width:100%" ${state.pins.length === 0 ? "disabled" : ""}>Submit ${state.pins.length} pins</button>
      <button class="btn tiny" id="btn-clear" style="margin-top:6px">Clear all</button>
    `;
  } else if (stage === "submitted") {
    const score = state.score;
    state.fountainsScore = score.total;
    html = `
      <div class="feedback-card${score.total < 20 ? " warning" : ""}">
        <h4>Result <span class="step-score">${score.total} / 35</span></h4>
        <p>Matched <b>${score.matchCount}</b>/${TOTAL_FOUNTAINS} within 80 m.</p>
        <p>Average distance: <b>${Math.round(score.avgDistM)} m</b></p>
      </div>
      <button class="btn primary" id="btn-finish" style="width:100%">See final result →</button>
    `;
  }
  wrap.innerHTML = html;
  const range = wrap.querySelector("#g-range");
  const num = wrap.querySelector("#g-num");
  if (range && num) {
    const sync = (v) => {
      const n = Math.max(0, Math.min(100, parseInt(v) || 0));
      state.fountainGuess = n; range.value = n; num.value = n;
    };
    range.addEventListener("input", (e) => sync(e.target.value));
    num.addEventListener("change", (e) => sync(e.target.value));
  }
  const lock = wrap.querySelector("#btn-lock");
  if (lock) lock.addEventListener("click", () => { state.fountainGuessLocked = true; render(); });
  const submit = wrap.querySelector("#btn-submit");
  if (submit) submit.addEventListener("click", () => {
    state.score = computeFountainScore(); state.pinsSubmitted = true; render();
  });
  const clear = wrap.querySelector("#btn-clear");
  if (clear) clear.addEventListener("click", () => {
    if (state.pins.length && !confirm("Clear all pins?")) return;
    state.pins = []; render();
  });
  const finish = wrap.querySelector("#btn-finish");
  if (finish) finish.addEventListener("click", () => { state.step = 5; render(); });
  return wrap;
}

function buildFountainsMap(stage) {
  const root = makeBaseMap();
  drawAxisLine(root, { x: TRUTH_CARDO.x1, y: TRUTH_CARDO.y1 },
                     { x: TRUTH_CARDO.x2, y: TRUTH_CARDO.y2 }, "#6b5a3d", null);
  drawAxisLine(root, { x: TRUTH_DECUMANUS.x1, y: TRUTH_DECUMANUS.y1 },
                     { x: TRUTH_DECUMANUS.x2, y: TRUTH_DECUMANUS.y2 }, "#6b5a3d", null);
  // Forum (faint)
  root.appendChild(svg("rect", {
    x: TRUTH_FORUM.x, y: TRUTH_FORUM.y,
    width: TRUTH_FORUM.w, height: TRUTH_FORUM.h,
    fill: "rgba(107,90,61,0.18)", stroke: "#6b5a3d", "stroke-width": 0.6,
  }));
  // All buildings (faint)
  Object.values(PUZZLE_BUILDINGS).forEach(b => {
    b.paths.forEach(d => {
      root.appendChild(svg("path", {
        d, fill: "rgba(107,90,61,0.25)", stroke: "#6b5a3d",
        "stroke-width": 0.5, "stroke-linejoin": "round",
      }));
    });
  });

  // ── HINT OVERLAYS ──
  const hintsOn = state.activeFountainHints || [];

  if (hintsOn.includes("density")) {
    const g = svg("g"); g.style.pointerEvents = "none";
    g.appendChild(svg("ellipse", { cx: 245, cy: 325, rx: 130, ry: 110, fill: "rgba(74,124,143,0.12)" }));
    g.appendChild(svg("ellipse", { cx: 345, cy: 425, rx: 90, ry: 90, fill: "rgba(74,124,143,0.09)" }));
    g.appendChild(svg("ellipse", { cx: 570, cy: 490, rx: 95, ry: 80, fill: "rgba(196,85,62,0.10)" }));
    g.appendChild(svgText("higher density", { x: 245, y: 225, "text-anchor": "middle",
      "font-size": 9, fill: "#4a7c8f", opacity: 0.8, "font-family": "var(--sans)" }));
    g.appendChild(svgText("lower density", { x: 570, y: 580, "text-anchor": "middle",
      "font-size": 9, fill: "#c4553e", opacity: 0.8, "font-family": "var(--sans)" }));
    root.appendChild(g);
  }

  if (hintsOn.includes("traffic")) {
    const g = svg("g"); g.style.pointerEvents = "none";
    // Via dell'Abbondanza approximate — runs along the decumanus
    g.appendChild(svg("rect", {
      x: 100, y: 432, width: 600, height: 16, fill: "rgba(196,85,62,0.12)", rx: 2,
      transform: "rotate(-6 400 440)",
    }));
    g.appendChild(svgText("Via dell'Abbondanza — heavy traffic", {
      x: 400, y: 425, "text-anchor": "middle",
      "font-size": 8, fill: "#c4553e", "font-weight": 600, opacity: 0.8,
      "font-family": "var(--sans)",
    }));
    // Via Stabiana — along the cardo
    g.appendChild(svg("rect", {
      x: 340, y: 200, width: 14, height: 400, fill: "rgba(196,85,62,0.12)", rx: 2,
      transform: "rotate(18 347 400)",
    }));
    root.appendChild(g);
  }

  if (hintsOn.includes("junctions")) {
    const g = svg("g"); g.style.pointerEvents = "none";
    SAMPLE_JUNCTIONS.forEach(pt => {
      g.appendChild(svg("circle", { cx: pt.x, cy: pt.y, r: 6,
        fill: "rgba(74,124,143,0.15)", stroke: "#4a7c8f", "stroke-width": 0.5,
        "stroke-dasharray": "1.5,1.5" }));
      g.appendChild(svg("circle", { cx: pt.x, cy: pt.y, r: 1.4, fill: "#4a7c8f", opacity: 0.6 }));
    });
    root.appendChild(g);
  }

  if (hintsOn.includes("radius")) {
    const g = svg("g"); g.style.pointerEvents = "none";
    [FOUNTAINS[2], FOUNTAINS[13], FOUNTAINS[19], FOUNTAINS[24], FOUNTAINS[32]].forEach(f => {
      g.appendChild(svg("circle", { cx: f.x, cy: f.y, r: RADIUS_80M,
        fill: "rgba(74,124,143,0.07)", stroke: "#4a7c8f", "stroke-width": 0.4,
        "stroke-dasharray": "2,2" }));
    });
    root.appendChild(g);
  }

  if (hintsOn.includes("watersystem")) {
    const g = svg("g"); g.style.pointerEvents = "none";
    const cx = 395, cy = 205;
    g.appendChild(svg("rect", {
      x: cx - 8, y: cy - 6, width: 16, height: 12,
      fill: "#4a7c8f", rx: 1.5, opacity: 0.85,
    }));
    g.appendChild(svgText("CA", { x: cx, y: cy + 2.5, "text-anchor": "middle",
      "font-size": 5, fill: "white", "font-weight": 700, "font-family": "var(--sans)" }));
    g.appendChild(svgText("Castellum Aquae", { x: cx, y: cy - 10, "text-anchor": "middle",
      "font-size": 7, fill: "#4a7c8f", "font-weight": 600, "font-family": "var(--sans)" }));
    // Define arrow marker once
    const defs = svg("defs");
    defs.innerHTML = `<marker id="arrowhead-water" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#4a7c8f" opacity="0.7"/>
    </marker>`;
    g.appendChild(defs);
    const arrow = (x1, y1, x2, y2) => svg("line", {
      x1, y1, x2, y2, stroke: "#4a7c8f", "stroke-width": 0.8,
      opacity: 0.5, "marker-end": "url(#arrowhead-water)",
    });
    g.appendChild(arrow(cx, cy + 6, cx, cy + 65));
    g.appendChild(arrow(cx, cy + 6, cx - 50, cy + 50));
    g.appendChild(arrow(cx, cy + 6, cx + 50, cy + 50));
    g.appendChild(arrow(cx, cy + 6, cx - 80, cy + 25));
    g.appendChild(arrow(cx, cy + 6, cx + 80, cy + 25));
    root.appendChild(g);
  }


  // Truth fountains (reveal after submit)
  if (state.pinsSubmitted) {
    const matchedSet = new Set(state.score.matches.map(m => m.fi));
    const tg = svg("g", { class: "fade-in" });
    FOUNTAINS.forEach((f, i) => {
      tg.appendChild(svg("circle", {
        cx: f.x, cy: f.y, r: 4,
        fill: matchedSet.has(i) ? "#5a8a5e" : "#4a7c8f",
        stroke: "white", "stroke-width": 0.7, opacity: 0.9,
      }));
    });
    state.score.matches.forEach(m => {
      const r = FOUNTAINS[m.fi]; const p = state.pins[m.pi];
      tg.appendChild(svg("line", {
        x1: p.x, y1: p.y, x2: r.x, y2: r.y,
        stroke: "#5a8a5e", "stroke-width": 0.6,
        "stroke-dasharray": "2,2", opacity: 0.65,
      }));
    });
    root.appendChild(tg);
  }

  // User pins
  state.pins.forEach((p, i) => {
    const g = svg("g");
    if (!state.pinsSubmitted) {
      g.style.cursor = "pointer";
      g.addEventListener("click", (e) => {
        e.stopPropagation(); state.pins.splice(i, 1); render();
      });
    }
    g.appendChild(svg("ellipse", {
      cx: p.x, cy: p.y + 2, rx: 2.5, ry: 1.2,
      fill: "rgba(196,85,62,0.3)",
    }));
    g.appendChild(svg("path", {
      d: `M${p.x},${p.y - 7} C${p.x - 4},${p.y - 7} ${p.x - 4},${p.y - 2} ${p.x},${p.y}
          C${p.x + 4},${p.y - 2} ${p.x + 4},${p.y - 7} ${p.x},${p.y - 7}Z`,
      fill: "#c4553e", stroke: "white", "stroke-width": 0.5,
    }));
    g.appendChild(svg("circle", { cx: p.x, cy: p.y - 5, r: 1.2, fill: "white", opacity: 0.9 }));
    root.appendChild(g);
  });

  if (stage === "placing") {
    root.style.cursor = state.pins.length < state.fountainGuess ? "crosshair" : "not-allowed";
    root.addEventListener("click", (e) => {
      if (state.pins.length >= state.fountainGuess) return;
      const p = getSvgPt(root, e);
      if (p.x < CITY_BOUNDS.minX || p.x > CITY_BOUNDS.maxX ||
          p.y < CITY_BOUNDS.minY || p.y > CITY_BOUNDS.maxY) return;
      state.pins.push({ x: +p.x.toFixed(1), y: +p.y.toFixed(1) });
      render();
    });
  }
  return root;
}

function computeFountainScore() {
  const pins = state.pins;
  const pairs = [];
  FOUNTAINS.forEach((f, fi) => pins.forEach((p, pi) => {
    pairs.push({ fi, pi, d: Math.hypot(f.x - p.x, f.y - p.y) });
  }));
  pairs.sort((a, b) => a.d - b.d);
  const usedReal = new Set(), usedPin = new Set();
  const matches = []; let totalDist = 0;
  for (const { fi, pi, d } of pairs) {
    if (usedReal.has(fi) || usedPin.has(pi)) continue;
    if (d <= FOUNTAIN_MATCH_RADIUS) {
      usedReal.add(fi); usedPin.add(pi);
      matches.push({ fi, pi, d }); totalDist += d;
    }
  }
  const matchCount = matches.length;
  const coverage = matchCount / TOTAL_FOUNTAINS;
  const avgDist = matchCount > 0 ? totalDist / matchCount : FOUNTAIN_MATCH_RADIUS;
  const quality = 1 - avgDist / FOUNTAIN_MATCH_RADIUS;
  const guessError = Math.abs(state.fountainGuess - TOTAL_FOUNTAINS) / TOTAL_FOUNTAINS;
  const guessScore = Math.max(0, Math.round(5 * (1 - guessError)));
  const coverageScore = Math.round(18 * coverage);
  const qualityScore = matchCount > 0 ? Math.round(12 * quality) : 0;
  const overshoot = Math.max(0, state.fountainGuess - TOTAL_FOUNTAINS);
  const penalty = Math.min(8, Math.round(overshoot * 0.2));
  const total = Math.max(0, guessScore + coverageScore + qualityScore - penalty);
  return { matchCount, matches, avgDistM: avgDist / UNIT_PER_M,
    guessScore, coverageScore, qualityScore, penalty, total };
}

// ═══════════════════════════════════════════════════════════════════════════
// STEP 5 — RESULTS
// ═══════════════════════════════════════════════════════════════════════════
function renderResults() {
  const totalScore = state.axesScore + state.forumScore + state.buildingsScore + state.fountainsScore;
  const g = getGrade(totalScore);

  const left = document.createElement("div");

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h2>Total — <em>${totalScore} / 100</em></h2>
    <div class="score-banner">
      <div class="score-num">${totalScore}<small> / 100</small></div>
      <div>
        <div class="grade">${g.grade}</div>
        <div class="grade-desc">${g.desc}</div>
      </div>
    </div>
    <div class="breakdown">
      <div class="breakdown-item">
        <div class="breakdown-label">Step 1 · Axes</div>
        <div class="breakdown-val">${state.axesScore} / 20</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-label">Step 2 · Forum</div>
        <div class="breakdown-val">${state.forumScore} / 15</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-label">Step 3 · Buildings</div>
        <div class="breakdown-val">${state.buildingsScore} / 30</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-label">Step 4 · Fountains</div>
        <div class="breakdown-val">${state.fountainsScore} / 35</div>
      </div>
    </div>
    <p style="font-size:11.5px;color:var(--muted);margin-bottom:12px">
      Red = your placements; brown = historical Pompeii; blue = fountains; green = matches.
    </p>
    <div class="action-bar">
      <button class="btn primary" id="btn-restart">Play again ↻</button>
      <button class="btn" id="btn-leaderboard" disabled style="opacity:0.5">Submit to leaderboard (coming soon)</button>
    </div>
  `;
  card.querySelector("#btn-restart").addEventListener("click", () => {
    Object.assign(state, {
      step: 0,
      cardoEnds: null, decumanusEnds: null, axesRevealed: false,
      forumPos: null, forumRevealed: false,
      placedBuildings: {}, buildingsRevealed: false,
      fountainGuess: 30, fountainGuessLocked: false, pins: [], pinsSubmitted: false,
      activeFountainHints: [],
      axesScore: 0, forumScore: 0, buildingsScore: 0, fountainsScore: 0,
      score: null,
    });
    render();
  });
  left.appendChild(card);

  const right = buildFinalMap();
  return { left, right };
}

function buildFinalMap() {
  const root = makeBaseMap();
  // Truth axes
  drawAxisLine(root, { x: TRUTH_CARDO.x1, y: TRUTH_CARDO.y1 },
                     { x: TRUTH_CARDO.x2, y: TRUTH_CARDO.y2 }, "#6b5a3d", null);
  drawAxisLine(root, { x: TRUTH_DECUMANUS.x1, y: TRUTH_DECUMANUS.y1 },
                     { x: TRUTH_DECUMANUS.x2, y: TRUTH_DECUMANUS.y2 }, "#6b5a3d", null);
  // User axes
  if (state.cardoEnds?.length === 2) drawAxisLine(root, state.cardoEnds[0], state.cardoEnds[1], "#c4553e", null);
  if (state.decumanusEnds?.length === 2) drawAxisLine(root, state.decumanusEnds[0], state.decumanusEnds[1], "#c4553e", null);
  // Truth forum
  root.appendChild(svg("rect", {
    x: TRUTH_FORUM.x, y: TRUTH_FORUM.y,
    width: TRUTH_FORUM.w, height: TRUTH_FORUM.h,
    fill: "rgba(107,90,61,0.3)", stroke: "#6b5a3d", "stroke-width": 1,
  }));
  // Truth buildings
  Object.values(PUZZLE_BUILDINGS).forEach(b => {
    b.paths.forEach(d => {
      root.appendChild(svg("path", {
        d, fill: "rgba(107,90,61,0.4)", stroke: "#6b5a3d",
        "stroke-width": 0.6, "stroke-linejoin": "round",
      }));
    });
  });
  // Fountains + matches
  const matchedSet = new Set(state.score.matches.map(m => m.fi));
  FOUNTAINS.forEach((f, i) => {
    root.appendChild(svg("circle", {
      cx: f.x, cy: f.y, r: 3,
      fill: matchedSet.has(i) ? "#5a8a5e" : "#4a7c8f",
      stroke: "white", "stroke-width": 0.5,
    }));
  });
  state.score.matches.forEach(m => {
    const r = FOUNTAINS[m.fi]; const p = state.pins[m.pi];
    root.appendChild(svg("line", {
      x1: p.x, y1: p.y, x2: r.x, y2: r.y,
      stroke: "#5a8a5e", "stroke-width": 0.5,
      "stroke-dasharray": "2,2", opacity: 0.6,
    }));
  });
  // User pins
  state.pins.forEach(p => {
    root.appendChild(svg("circle", {
      cx: p.x, cy: p.y, r: 2,
      fill: "#c4553e", stroke: "white", "stroke-width": 0.4,
    }));
  });
  return root;
}

function getGrade(score) {
  if (score >= 85) return { grade: "Architectus", desc: "You could have designed this system." };
  if (score >= 70) return { grade: "Aedilis", desc: "A magistrate worthy of the water supply." };
  if (score >= 50) return { grade: "Civis", desc: "A decent citizen's intuition." };
  if (score >= 30) return { grade: "Peregrinus", desc: "A visitor finding their way." };
  return { grade: "Barbarus", desc: "The system remains mysterious to you." };
}

// ═══════════════════════════════════════════════════════════════════════════
// COMMON: base map (with image)
// ═══════════════════════════════════════════════════════════════════════════
function makeBaseMap(mode) {
  // mode: "full" (default, includes base map image) or "streets" (just street network)
  mode = mode || "full";
  const root = svg("svg", {
    viewBox: `${VB.x} ${VB.y} ${VB.w} ${VB.h}`,
    xmlns: SVGNS, preserveAspectRatio: "xMidYMid meet",
  });
  root.style.width = "100%";
  root.style.height = "auto";
  if (mode === "full") {
    const img = svg("image", {
      href: BASE_DATA_URL, x: VB.x, y: VB.y, width: VB.w, height: VB.h,
    });
    img.setAttributeNS("http://www.w3.org/1999/xlink", "href", BASE_DATA_URL);
    img.style.pointerEvents = "none";
    root.appendChild(img);
  } else if (mode === "streets") {
    // Draw the street network as a g group
    const streetsG = svg("g", { class: "streets" });
    streetsG.style.pointerEvents = "none";
    STREET_PATHS.forEach(d => {
      streetsG.appendChild(svg("path", {
        d, fill: "none", stroke: "#3d3425", "stroke-width": 0.5,
        "stroke-linejoin": "round", opacity: 0.6,
      }));
    });
    root.appendChild(streetsG);
  }
  // Scale bar
  const sbX = 50, sbY = 615;
  const sbW = 100 * UNIT_PER_M;
  const sb = svg("g");
  sb.style.pointerEvents = "none";
  sb.appendChild(svg("line", { x1: sbX, y1: sbY, x2: sbX + sbW, y2: sbY,
    stroke: "#3d3425", "stroke-width": 0.6 }));
  sb.appendChild(svg("line", { x1: sbX, y1: sbY - 2, x2: sbX, y2: sbY + 2,
    stroke: "#3d3425", "stroke-width": 0.6 }));
  sb.appendChild(svg("line", { x1: sbX + sbW, y1: sbY - 2, x2: sbX + sbW, y2: sbY + 2,
    stroke: "#3d3425", "stroke-width": 0.6 }));
  sb.appendChild(svgText("100 m", {
    x: sbX + sbW / 2, y: sbY + 7, "text-anchor": "middle",
    "font-size": 5, fill: "#8a7d6b", "font-family": "'DM Sans', sans-serif",
  }));
  root.appendChild(sb);
  return root;
}

render();
</script>
